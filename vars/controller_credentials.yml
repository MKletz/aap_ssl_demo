---
controller_credentials:
  - name: Windows admin
    organization: Default
    update_secrets: false
    credential_type: Machine
    inputs:
      username: 'ansible'
      password: "P@$$w0rd"
      become_method: "runas"

  - name: RHEL admin
    organization: Default
    update_secrets: false
    credential_type: Machine
    inputs:
      username: 'cloud-user'
      become_method: "sudo"

  - name: Cloudflare
    organization: Default
    update_secrets: false
    credential_type: "Cloudflare ACME"
    inputs:
      cloudflare_token: 'change-me'
      acme_email: 'change-me'

  - name: Hashicorp Vault
    organization: Default
    update_secrets: false
    credential_type: "Hashicorp Vault"
    inputs:
      vault_url: 'change-me'
      vault_token: 'change-me'

  - name: Hashicorp Vault Lookup
    organization: Default
    update_secrets: false
    credential_type: "HashiCorp Vault Secret Lookup"
    inputs:
      url: 'change-me'
      token: 'change-me'
      api_version: 'v2'

  - name: Wildcard cert files
    organization: Default
    update_secrets: false
    credential_type: "Vault Cert Files"
    inputs:
      certificate_data: 'change-me'
      certificate_fullchain: 'change-me'
      vault_private_key: 'change-me'