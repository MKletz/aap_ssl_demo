---
controller.credential_type:
  - name: "Cloudflare ACME"
    description: "Cloudflare ACME DNS challenge"
    inputs:
      fields:
        - id: cloudflare_token
          type: string
          label: Cloudflare API Token
          secret: true
          help_text: >-
            The API Token created in the Cloudflare dashboard with DNS:Edit
            permissions.
        - id: acme_email
          type: string
          label: ACME Email Address
          help_text: Email used for Let's Encrypt registration and notifications.
      required:
        - cloudflare_token
        - acme_emai
    injectors:
      extra_vars:
        acme_email: '{{ acme_email }}'
        cloudflare_token: '{{ cloudflare_token }}'

  - name: "Vault Cert Files"
    description: "Cert files from vault"
    inputs:
      fields:
        - id: certificate_data
          type: string
          label: Signed Certificate
          secret: true
          multiline: true
        - id: certificate_fullchain
          type: string
          label: Signed SSH Certificate fullchain
          secret: true
          multiline: true
        - id: certificate_private_key
          type: string
          label: Signed SSH Certificate private key
          secret: true
          multiline: true
    injectors:
      extra_vars:
        vault_cert: '{{ certificate_data }}'
        vault_fullchain: '{{ certificate_fullchain }}'
        vault_private_key: '{{ certificate_private_key }}'

  - name: "Hashicorp Vault"
    description: "Connection details to Hashicorp Vault"
    inputs:
      fields:
        - id: vault_url
          type: string
          label: Vault Server URL
          format: url
          help_text: 'Example: http://vault.apps.openshift.info'
        - id: vault_token
          type: string
          label: Vault Token
          secret: true
          help_text: The token used to authenticate with the Vault API. Default is 'root' for dev instances.
          default: root
      required:
        - vault_url
        - vault_token
    injectors:
      extra_vars:
        vault_url: '{{ vault_url }}'
        vault_token: '{{ vault_token }}'