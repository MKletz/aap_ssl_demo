---
controller_credential_input_sources:
  - source_credential: Hashicorp Vault Lookup
    target_credential: Wildcard cert files
    input_field_name: certificate_data
    metadata:
      secret_path: "/secret/certificates/{{ domain_name }}"
      secret_key: "certificate"
    description: Fill the certificate from HashiCorp Vault

  - source_credential: Hashicorp Vault Lookup
    target_credential: Wildcard cert files
    input_field_name: certificate_fullchain
    metadata:
      secret_path: "/secret/certificates/{{ domain_name }}"
      secret_key: "fullchain"
    description: Fill the fullchain from HashiCorp Vault

  - source_credential: Hashicorp Vault Lookup
    target_credential: Wildcard cert files
    input_field_name: certificate_private_key
    metadata:
      secret_path: "/secret/certificates/{{ domain_name }}"
      secret_key: "private_key"
    description: Fill the private_key from HashiCorp Vault