---
workflow_job_templates:
  - name: acme ssl renewals
    name: "WORKFLOW // SSL Renewals"
    extra_vars: { domain_name: "{{ domain_name }}" }
    state: present

workflow_job_template_nodes:

  - name: Add Node 2 - configure cockpit
    workflow_job_template: "WORKFLOW // SSL Renewals"
    unified_job_template: "SSL // RHEL Cockpit"
    identifier: "Update RHEL Cockpit SSL"
    state: present

  - name: Add Node 2 - configure iis
    workflow_job_template: "WORKFLOW // SSL Renewals"
    unified_job_template: "SSL // Windows IIS"
    identifier: "Update Windows IIS"
    state: present

  - name: Add Node 1 - ACME renewal from CloudFlare
    workflow_job_template: "WORKFLOW // SSL Renewals"
    unified_job_template: "SSL // CloudFlare challenege"
    identifier: "ACME renewal from CloudFlare"
    state: present
    success_nodes:
      - "Update RHEL Cockpit SSL"
      - "Update Windows IIS"